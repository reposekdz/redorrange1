version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: redorrange-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-redorrange2025}
      MYSQL_DATABASE: ${DB_NAME:-redorrange}
      MYSQL_USER: ${DB_USER:-redorrange}
      MYSQL_PASSWORD: ${DB_PASSWORD:-redorrange2025}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-redorrange2025}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redorrange-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redorrange-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-redorrange}
      DB_PASSWORD: ${DB_PASSWORD:-redorrange2025}
      DB_NAME: ${DB_NAME:-redorrange}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      REDIS_URL: redis://redis:6379
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-http://localhost:3000/uploads}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: redorrange-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  uploads_data:
