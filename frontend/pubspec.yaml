name: redorrange
description: RedOrrange — Real-time Social Media Platform
publish_to: none
version: 2.0.0+100

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # ── HTTP & WebSocket
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^2.4.5
  connectivity_plus: ^6.0.5

  # ── Auth & Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ── Real Payment SDKs
  flutter_stripe: ^10.1.1         # Stripe native card UI
  webview_flutter: ^4.8.0         # PayPal & Flutterwave webview
  flutter_inappwebview: ^6.0.0    # Advanced webview for payments
  url_launcher: ^6.3.1

  # ── Images & Media
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  image_cropper: ^8.0.2

  # ── Video & Audio
  video_player: ^2.9.1
  chewie: ^1.8.5
  audioplayers: ^6.1.0
  record: ^5.1.2
  video_thumbnail: ^0.5.3

  # ── Files
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Camera & WebRTC
  camera: ^0.11.0+2
  flutter_webrtc: ^0.11.4

  # ── UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_slidable: ^3.1.1
  google_fonts: ^6.2.1

  # ── Local Notifications (no Firebase)
  flutter_local_notifications: ^17.2.4

  # ── Charts & Analytics
  fl_chart: ^0.69.0

  # ── Forms & Input
  pinput: ^5.0.0
  emoji_picker_flutter: ^2.3.0
  country_code_picker: ^3.0.0

  # ── QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # ── Location
  geolocator: ^12.0.0

  # ── Utilities
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  uuid: ^4.4.2
  collection: ^1.18.0
  intl: ^0.19.0
  timeago: ^3.7.0
  package_info_plus: ^8.1.0
  device_info_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
