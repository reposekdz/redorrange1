<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta name="description" content="RedOrrange — Stay Connected. Stay Real.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RedOrrange">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>RedOrrange</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FF6B35; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
    #splash {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; color: #fff; gap: 24px;
    }
    .logo {
      width: 96px; height: 96px; background: rgba(255,255,255,0.15);
      border-radius: 28px; display: flex; align-items: center;
      justify-content: center; font-size: 52px; font-weight: 900;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .app-name { font-size: 32px; font-weight: 900; letter-spacing: -0.5px; }
    .tagline { font-size: 14px; opacity: 0.7; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">R</div>
    <div class="app-name">RedOrrange</div>
    <div class="tagline">Stay Connected. Stay Real.</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Request browser notification permission (Web Notifications API — no Firebase)
    if ('Notification' in window && Notification.permission === 'default') {
      document.addEventListener('click', function req() {
        Notification.requestPermission();
        document.removeEventListener('click', req);
      }, { once: true });
    }

    // Show browser notification from Flutter via JS channel
    window.showBrowserNotification = function(title, body, icon, tag) {
      if (Notification.permission === 'granted') {
        new Notification(title, {
          body: body,
          icon: icon || '/icons/Icon-192.png',
          tag:  tag || 'redorrange',
          badge: '/icons/Icon-96.png',
        });
      }
    };

    // Unregister any stale service workers to force fresh load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }

    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('splash').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
